    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <linearGradient id="chipBg" x1="0" y1="0" x2="0" y2="1">
