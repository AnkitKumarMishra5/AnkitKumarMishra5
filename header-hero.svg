71;389;371" dur="4.20s" repeatCount="indefinite" begin="-0.5s"/><animate attributeName="opacity" values="0.3;0.6;0.3" dur="6.0s" repeatCount="indefinite" begin="-0.5s"/></circle><circle r="1.4" fill="#60a5fa" opacity="0.5"><animate attributeName="cx" values="56;64;56" dur="5.5s" repeatCount="indefinite" begin="-0.4s"/><animate attributeName="cy" values="210;230;210" dur="3.85s" repeatCount="indefinite" begin="-0.4s"/><animate attributeName="opacity" values="0.3;0.6;0.3" dur="5.5s" repeatCount="indefinite" begin="-0.4s"/></circle><circle r="1.6" fill="#a78bfa" opacity="0.5"><animate attributeName="cx" values="35;45;35" dur="6.0s" repeatCount="indefinite" begin="-0.9s"/><animate attributeName="cy" values="92;108;92" dur="4.20s" repeatCount="indefinite" begin="-0.9s"/><animate attributeName="opacity" values="0.3;0.6;0.3" dur="6.0s" repeatCount="indefinite" begin="-0.9s"/></circle><circle r="1.2" fill="#34d399" opacity="0.5"><animate attributeName="cx" values="47;53;47" dur="6.5s" repeatCount="indefinite" begin="-1.3s"/><animate attributeName="cy" values="369;391;369" dur="4.55s" repeatCount="indefinite" begin="-1.3s"/><animate attributeName="opacity" values="0.3;0.6;0.3" dur="6.5s" repeatCount="indefinite" begin="-1.3s"/></circle>

