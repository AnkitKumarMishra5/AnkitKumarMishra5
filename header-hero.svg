  </text>

  <!-- Bio -->
  <text x="80" y="240" fill="#cbd5e1" font-size="17" font-weight="400">7+ years architecting and scaling full-stack systems</text>
  <text x="80" y="263" fill="#cbd5e1" font-size="17" font-weight="400">across
    <tspan font-weight="700" fill="#60a5fa">FinTech</tspan>,
    <tspan font-weight="700" fill="#a78bfa">RegTech</tspan> &#x26;
    <tspan font-weight="700" fill="#34d399">EdTech</tspan>.
  </text>

