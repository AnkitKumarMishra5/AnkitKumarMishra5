<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 520" width="1500" height="520" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#070b12"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.1" cy="0.15" r="0.45">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.30"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.95" cy="0.9" r="0.4">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <linearGradient id="progGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#7ee787"/>
    </linearGradient>
    <filter id="winShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1500" height="520" fill="url(#bg)"/>
  <rect width="1500" height="520" fill="url(#grid)"/>
  <rect width="1500" height="520" fill="url(#g1)"/>
  <rect width="1500" height="520" fill="url(#g2)"/>

  <!-- Window -->
  <g filter="url(#winShadow)">
    <rect x="80" y="70" width="1340" height="430" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <rect x="80" y="70" width="1340" height="38" rx="12" fill="#161b22"/>
    <rect x="80" y="96" width="1340" height="12" fill="#161b22"/>
    <line x1="80" y1="108" x2="1420" y2="108" stroke="#30363d" stroke-width="1"/>
    <circle cx="108" cy="89" r="6.5" fill="#ff5f56"/>
    <circle cx="130" cy="89" r="6.5" fill="#ffbd2e"/>
    <circle cx="152" cy="89" r="6.5" fill="#27c93f"/>
    <text x="750" y="94" fill="#8b949e" font-size="13" text-anchor="middle">~/projects/ankit-mishra · zsh</text>
    <text x="1380" y="94" fill="#6e7681" font-size="14" text-anchor="middle">⋯</text>
  </g>

  <!-- Prompt + command -->
  <g font-size="14">
    <text x="160" y="148">
      <tspan fill="#7ee787">~/projects</tspan>
      <tspan fill="#c9d1d9"> </tspan>
      <tspan fill="#a78bfa">❯</tspan>
      <tspan fill="#c9d1d9"> npm install </tspan>
      <tspan fill="#79c0ff">@ankit-mishra/engineering-lead</tspan>
    </text>
  </g>

  <!-- Spinner / installed message -->
  <text x="160" y="180" font-size="16" font-family="'JetBrains Mono', monospace" xml:space="preserve"><tspan fill="#fbbf24">⠋</tspan><tspan fill="#c9d1d9"> Installing </tspan><tspan fill="#79c0ff">@ankit-mishra/engineering-lead</tspan><tspan fill="#c9d1d9">@7.0.0...</tspan><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.7;0.74;1" dur="5s" repeatCount="1" fill="freeze"/></text><text x="160" y="180" font-size="16" font-family="'JetBrains Mono', monospace" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Installed </tspan><tspan fill="#79c0ff">@ankit-mishra/engineering-lead</tspan><tspan fill="#c9d1d9">@7.0.0 in 3.6s</tspan><animate attributeName="opacity" values="0;1" begin="3.7s" dur="0.3s" fill="freeze"/></text>

  <!-- Streaming install lines -->
  <text x="160" y="220" font-size="14" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Resolving 7+ years of experience...           </tspan><tspan fill="#6e7681">120ms</tspan><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.3s" fill="freeze"/></text><text x="160" y="244" font-size="14" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Added </tspan><tspan fill="#79c0ff">languages   </tspan><tspan fill="#8b949e">TypeScript, JavaScript, Python, HTML5, CSS3</tspan><animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze"/></text><text x="160" y="268" font-size="14" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Added </tspan><tspan fill="#79c0ff">frontend    </tspan><tspan fill="#8b949e">React, Next.js, React Native, Redux, Tailwind, Vite</tspan><animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.3s" fill="freeze"/></text><text x="160" y="292" font-size="14" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Added </tspan><tspan fill="#79c0ff">backend     </tspan><tspan fill="#8b949e">Node.js, Express, GraphQL, Microservices, Serverless</tspan><animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/></text><text x="160" y="316" font-size="14" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Added </tspan><tspan fill="#79c0ff">databases   </tspan><tspan fill="#8b949e">PostgreSQL, MongoDB, Redis, MySQL, Firestore</tspan><animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/></text><text x="160" y="340" font-size="14" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Added </tspan><tspan fill="#79c0ff">cloud       </tspan><tspan fill="#8b949e">AWS, GCP, Firebase, Docker, CI/CD, GitHub Actions</tspan><animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/></text><text x="160" y="364" font-size="14" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Added </tspan><tspan fill="#79c0ff">domains     </tspan><tspan fill="#8b949e">FinTech, RegTech, EdTech</tspan><animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.3s" fill="freeze"/></text><text x="160" y="388" font-size="14" xml:space="preserve" opacity="0"><tspan fill="#7ee787">✓</tspan><tspan fill="#c9d1d9"> Added </tspan><tspan fill="#79c0ff">specialties </tspan><tspan fill="#8b949e">System Design · End-to-End · Team Leadership · Mentorship</tspan><animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/></text>

  <!-- Progress bar -->
  <rect x="160" y="415" width="800" height="8" rx="4" fill="#21262d"/><rect x="160" y="415" height="8" rx="4" fill="url(#progGrad)" width="0"><animate attributeName="width" values="0;800" dur="3.1s" begin="0.5s" fill="freeze"/></rect><text x="978" y="422" font-size="13" fill="#c9d1d9" font-family="'JetBrains Mono', monospace"><tspan opacity="0"><animate attributeName="opacity" values="0;1" begin="3.6s" dur="0.2s" fill="freeze"/>100%</tspan></text>

  <!-- Final summary -->
  <text x="160" y="455" font-size="14" font-family="'JetBrains Mono', monospace" xml:space="preserve" opacity="0"><tspan fill="#8b949e">› </tspan><tspan fill="#c9d1d9">Engineering at the intersection of </tspan><tspan fill="#7ee787">technical excellence</tspan><tspan fill="#c9d1d9"> &amp; </tspan><tspan fill="#7ee787">impactful delivery</tspan><tspan fill="#c9d1d9">.</tspan><animate attributeName="opacity" values="0;1" begin="4.0s" dur="0.4s" fill="freeze"/></text>
  <rect x="846" y="445" width="8" height="14" fill="#58a6ff" opacity="0"><animate attributeName="opacity" values="0.85;0.85;0;0" keyTimes="0;0.45;0.5;1" dur="1.1s" begin="4.4s" repeatCount="indefinite"/></rect>
</svg>